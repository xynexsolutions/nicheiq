<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NicheIQ — Find Your Niche</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--card:#16161f;--border:#2a2a3a;--accent:#7c5cfc;--a2:#fc5c7d;--a3:#5cf0c8;--a4:#fcb45c;--text:#f0eeff;--muted:#7a7a9a;--glow:rgba(124,92,252,0.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,92,252,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.lang-bar{display:flex;justify-content:flex-end;padding:14px 20px 0;max-width:780px;margin:0 auto;position:relative;z-index:2}
.lang-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:3px;gap:2px}
.lang-btn{padding:5px 16px;border-radius:100px;border:none;background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .22s;font-family:'Plus Jakarta Sans',sans-serif}
.lang-btn.active{background:linear-gradient(135deg,var(--accent),#5a3cc4);color:white;box-shadow:0 2px 10px var(--glow)}
.container{max-width:780px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
header{padding:24px 0 22px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(124,92,252,0.2),rgba(92,240,200,0.1));border:1px solid rgba(124,92,252,0.3);border-radius:100px;padding:6px 16px;font-size:11px;font-weight:700;color:var(--a3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;font-family:'Outfit',sans-serif}
.dot{width:6px;height:6px;background:var(--a3);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
h1{font-family:'Outfit',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:800;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--accent) 70%,var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.subtitle{color:var(--muted);font-size:15px;line-height:1.6;max-width:500px;margin:0 auto}
.prog-wrap{margin:24px 0 20px;display:none}.prog-wrap.on{display:block}
.prog-top{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px}
.prog-track{height:3px;background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--a2));border-radius:99px;transition:width .5s ease}
#chat{display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:12px;animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg.ai{align-items:flex-start}.msg.user{flex-direction:row-reverse}
.av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;margin-top:2px}
.av.ai-av{background:linear-gradient(135deg,var(--accent),var(--a2));box-shadow:0 0 16px var(--glow)}
.av.u-av{background:var(--card);border:1px solid var(--border)}
.bub{max-width:85%;padding:13px 17px;border-radius:16px;font-size:15px;line-height:1.65}
.msg.ai .bub{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px}
.msg.user .bub{background:linear-gradient(135deg,var(--accent),#5a3cc4);border-top-right-radius:4px;color:#fff}
.chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{padding:8px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.chip:hover{border-color:var(--accent);background:rgba(124,92,252,0.1);color:#fff;transform:translateY(-1px)}
.chip.sel{border-color:var(--accent);background:rgba(124,92,252,0.2);color:var(--a3)}
.think{display:flex;gap:5px;align-items:center;padding:13px 17px}
.think span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite}
.think span:nth-child(2){animation-delay:.2s}.think span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-6px);opacity:1}}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;margin-top:6px}
.score-card{background:linear-gradient(135deg,rgba(124,92,252,0.08),rgba(252,92,125,0.05));border:1px solid rgba(124,92,252,0.2);border-radius:16px;padding:18px;margin-top:10px}
.score-overall{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.06)}
.score-grade{font-family:'Outfit',sans-serif;font-size:36px;font-weight:900;color:white;line-height:1}
.score-grade span{font-size:14px;font-weight:500;color:var(--muted);display:block;margin-top:2px}
.score-summary{font-size:13px;color:#b0aece;line-height:1.6;max-width:70%;text-align:right}
.score-metric{margin-bottom:12px}.score-metric:last-child{margin-bottom:0}
.score-metric-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.score-metric-name{font-size:12.5px;font-weight:600;color:var(--soft,#a8a8cc)}
.score-metric-val{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;padding:2px 10px;border-radius:100px}
.sv-high{background:rgba(92,240,200,0.15);color:var(--a3)}
.sv-mod{background:rgba(252,180,92,0.15);color:var(--a4)}
.sv-low{background:rgba(252,92,125,0.15);color:var(--a2)}
.score-bar-track{height:6px;background:rgba(255,255,255,0.07);border-radius:99px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.score-metric-reason{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5}
.comp-card{background:linear-gradient(135deg,rgba(252,180,92,0.07),rgba(124,92,252,0.05));border:1px solid rgba(252,180,92,0.18);border-radius:16px;padding:18px;margin-top:10px}
.comp-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.comp-item:last-child{border-bottom:none}
.comp-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.comp-name{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:white}
.comp-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:100px}
.cb-high{background:rgba(252,92,125,0.15);color:#ff7fa0}
.cb-med{background:rgba(252,180,92,0.15);color:var(--a4)}
.cb-low{background:rgba(92,240,200,0.15);color:var(--a3)}
.comp-desc{font-size:13px;color:#a8a8c8;line-height:1.6;margin-bottom:5px}
.comp-gap{font-size:12.5px;color:var(--a3);font-weight:500}
.comp-gap::before{content:"💡 Gap: "}
.comp-summary{background:rgba(124,92,252,0.08);border:1px solid rgba(124,92,252,0.15);border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13.5px;color:#c8c4e8;line-height:1.65}
.price-card{background:linear-gradient(135deg,rgba(92,240,200,0.06),rgba(124,92,252,0.05));border:1px solid rgba(92,240,200,0.15);border-radius:16px;padding:18px;margin-top:10px}
.price-tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.price-tier{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:14px 12px;text-align:center}
.price-tier-name{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.pt-beginner .price-tier-name{color:#a88fff}
.pt-intermediate .price-tier-name{color:var(--a4)}
.pt-expert .price-tier-name{color:var(--a3)}
.price-amount{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:white;line-height:1;margin-bottom:3px}
.price-unit{font-size:11px;color:var(--muted);margin-bottom:8px}
.price-hourly{font-size:12px;color:var(--soft);padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)}
.price-tip{background:rgba(92,240,200,0.07);border:1px solid rgba(92,240,200,0.15);border-radius:10px;padding:11px 14px;font-size:13px;color:#b0eed8;line-height:1.6}
.price-tip::before{content:"💡 ";font-size:14px}
@media(max-width:480px){.price-tiers{grid-template-columns:1fr}}
.plan-card{background:linear-gradient(135deg,rgba(124,92,252,0.07),rgba(92,240,200,0.04));border:1px solid rgba(124,92,252,0.18);border-radius:16px;padding:18px;margin-top:10px}
.plan-week{margin-bottom:16px}.plan-week:last-child{margin-bottom:0}
.plan-week-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.plan-week-badge{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:100px;white-space:nowrap}
.pw-1{background:rgba(124,92,252,0.18);color:#b39fff}
.pw-2{background:rgba(252,180,92,0.18);color:var(--a4)}
.pw-3{background:rgba(92,240,200,0.18);color:var(--a3)}
.pw-4{background:rgba(252,92,125,0.18);color:#ff9fb8}
.plan-week-title{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:white}
.plan-tasks{display:flex;flex-direction:column;gap:6px}
.plan-task{display:flex;align-items:flex-start;gap:10px;font-size:13.5px;color:#c0bce0;line-height:1.55}
.plan-task-num{width:20px;height:20px;border-radius:6px;background:rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0;margin-top:1px}
.plan-goal{background:rgba(92,240,200,0.07);border:1px solid rgba(92,240,200,0.15);border-radius:10px;padding:11px 14px;margin-top:14px;font-size:13px;color:#b0eed8;line-height:1.6}
.plan-goal::before{content:"🎯 Goal: ";font-weight:600}
.content-card{background:linear-gradient(135deg,rgba(252,92,125,0.06),rgba(124,92,252,0.05));border:1px solid rgba(252,92,125,0.15);border-radius:16px;padding:18px;margin-top:10px}
.content-platforms{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.content-platform-tab{padding:5px 14px;border-radius:100px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid transparent;transition:all .2s}
.content-platform-tab.active{background:rgba(252,92,125,0.18);border-color:rgba(252,92,125,0.3);color:#ff9fb8}
.content-platform-tab:not(.active){background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.08);color:var(--muted)}
.content-ideas-list{display:none}.content-ideas-list.active{display:flex;flex-direction:column;gap:8px}
.content-idea{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:12px 14px;transition:border-color .2s}
.content-idea:hover{border-color:rgba(252,92,125,0.25)}
.ci-type{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px}
.ci-type-hook{color:#ff9fb8}
.ci-type-edu{color:var(--a3)}
.ci-type-story{color:var(--a4)}
.ci-type-trend{color:#a88fff}
.ci-title{font-size:14px;color:white;font-weight:500;line-height:1.5;margin-bottom:4px}
.ci-why{font-size:12px;color:var(--muted);line-height:1.5}
.content-trend-note{background:rgba(124,92,252,0.07);border:1px solid rgba(124,92,252,0.15);border-radius:10px;padding:11px 14px;margin-top:14px;font-size:13px;color:#c8c4e8;line-height:1.6}
.content-trend-note::before{content:"📈 Trend: ";font-weight:600;color:#a88fff}
.rsec{margin-bottom:20px}.rsec:last-child{margin-bottom:0}
.rlabel{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--a3);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.rlabel::after{content:'';flex:1;height:1px;background:var(--border)}
.rtitle{font-family:'Outfit',sans-serif;font-size:21px;font-weight:700;color:white;margin-bottom:7px}
.rtext{color:#c0bdd8;font-size:14px;line-height:1.7}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px}
.tag{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:500}
.tag.teal{background:rgba(92,240,200,0.1);border:1px solid rgba(92,240,200,0.25);color:var(--a3)}
.divider{height:1px;background:var(--border);margin:18px 0}
.outreach-box{background:linear-gradient(135deg,rgba(252,180,92,0.07),rgba(252,92,125,0.04));border:1px solid rgba(252,180,92,0.22);border-radius:14px;padding:18px;margin-top:10px}
.outreach-msg{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:#d8d4f0;font-size:14px;line-height:1.75;white-space:pre-wrap}
.copy-btn{margin-top:10px;display:inline-flex;align-items:center;gap:7px;padding:8px 17px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.copy-btn:hover{border-color:var(--a3);color:var(--a3)}.copy-btn.ok{color:var(--a3);border-color:var(--a3)}
.portfolio-input-wrap{background:var(--card);border:1px solid rgba(92,240,200,0.2);border-radius:14px;padding:16px;margin-top:10px}
.portfolio-input-wrap textarea{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;resize:vertical;min-height:90px;outline:none;line-height:1.6}
.portfolio-input-wrap textarea:focus{border-color:var(--accent)}
.portfolio-input-wrap textarea::placeholder{color:var(--muted)}
.portfolio-submit{margin-top:10px;padding:9px 22px;border-radius:100px;background:linear-gradient(135deg,var(--accent),#5a3cc4);border:none;color:white;font-size:14px;font-weight:500;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.portfolio-submit:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--glow)}
.chat-hint{background:linear-gradient(135deg,rgba(92,240,200,0.06),rgba(124,92,252,0.06));border:1px solid rgba(92,240,200,0.15);border-radius:12px;padding:12px 16px;font-size:13.5px;color:var(--a3);margin-top:4px}
.restart-btn{margin-top:14px;padding:9px 20px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
.restart-btn:hover{border-color:var(--a2);color:var(--a2)}
#input-area{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 28%);padding:18px 20px;z-index:10}
.input-box{max-width:780px;margin:0 auto;display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:9px 9px 9px 17px;transition:border-color .2s,box-shadow .2s}
.input-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,0.1)}
#user-input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:15px;font-family:'Plus Jakarta Sans',sans-serif;resize:none;max-height:120px;min-height:24px;line-height:1.5}
#user-input::placeholder{color:var(--muted)}
#send-btn{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#5a3cc4);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;color:white}
#send-btn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 0 14px var(--glow)}
#send-btn:disabled{opacity:.35;cursor:not-allowed}
.spacer{height:120px}#bottom{height:1px}
</style>
</head>
<body>
<div class="lang-bar">
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">English</button>
    <button class="lang-btn" id="btn-ur" onclick="setLang('ur')">اردو</button>
  </div>
</div>
<div class="container">
  <header>
    <div class="badge"><span class="dot"></span> <span id="badge-txt">AI-Powered Niche Discovery</span></div>
    <h1 id="main-h1">Find Your Exact Niche & First Clients</h1>
    <p class="subtitle" id="main-sub">Answer a few questions — AI finds your niche, target audience, their problems, solutions, and writes your first client outreach message.</p>
  </header>
  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-top"><span id="prog-label">Question 1/7</span><span id="prog-pct">0%</span></div>
    <div class="prog-track"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div id="chat"></div>
  <div class="spacer"></div>
  <div id="bottom"></div>
</div>
<div id="input-area">
  <div class="input-box">
    <textarea id="user-input" rows="1" placeholder="Type your answer here..." disabled></textarea>
    <button id="send-btn" disabled>
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const UI = {
  en: {
    badge:"AI-Powered Niche Discovery", h1:"Find Your Exact Niche & First Clients",
    sub:"Answer a few questions — AI finds your niche, target audience, their problems, solutions, and writes your first client outreach message.",
    ph:"Type your answer here...", phChat:"Ask anything about your niche, outreach, next steps...",
    progTxt:(c,t)=>`Question ${c} / ${t}`,
    analyzing:"Thank you! Analyzing your full profile... crafting your personalized niche report 🔍",
    analyzingPortfolio:"Analyzing your portfolio to personalize your outreach message... 🔍",
    resultIntro:"✅ Analysis complete! Here's your personalized roadmap:",
    chatHint:"💬 Questions about your niche, outreach, or next steps? Ask me anything!",
    restart:"↩ Start Over", copy:"Copy Message", copied:"✓ Copied!",
    labels:{
      niche:"Your Exact Niche", why:"Why This Niche?", audience:"Target Audience",
      problems:"Their Problems", solutions:"Your Solutions", ai:"AI Era Opportunity",
      step:"First Step This Week", outreach:"✉️ Your Client Outreach Message",
      outreachPortfolio:"Personalized using your portfolio — ready to send",
      outreachGeneric:"Niche-specific — ready to send",
      scoreCard:"📊 Niche Score Card",
      scoreMetrics:["Market Demand","Competition Level","Income Potential","AI Disruption Risk"],
      scoreOverall:"Overall Verdict",
      compLabel:"🔍 Competitor Analysis",
      compAnalyzing:"Analyzing your competitors and market gaps...",
      compGapLabel:"Your Winning Angle",
      compThreats:"Threat Level",
      priceLabel:"💰 Pricing Guide",
      priceAnalyzing:"Building your personalized pricing guide...",
      priceTiers:["Beginner","Intermediate","Expert"],
      pricePerProject:"per project",
      pricePerHour:"per hour",
      priceTip:"Pricing Tip",
      planLabel:"📅 30-Day Action Plan",
      planAnalyzing:"Building your personalized 30-day action plan...",
      planWeeks:["Week 1","Week 2","Week 3","Week 4"],
      planGoalLabel:"End Goal",
      contentLabel:"💡 Content Ideas Generator",
      contentAnalyzing:"Generating trending content ideas for your niche...",
      contentPlatforms:["LinkedIn","YouTube","Instagram","Twitter/X"],
      contentTypes:{"hook":"Hook","edu":"Educational","story":"Story","trend":"Trending"}
    },
    portfolioHasQ:"You have portfolio work — great! Want AI to personalize your outreach using your actual work?",
    portfolioOptYes:"Yes — I'll describe my work",
    portfolioOptNo:"No — write niche-based message",
    portfolioDescQ:"Describe your best portfolio work in 2–3 sentences.\nWhat did you make? For whom? What result did it get?\n\n(e.g. \"I designed a Shopify store for a clothing brand that boosted their sales by 40%\")",
    portfolioDescPh:"Describe your best work here...",
    portfolioDescBtn:"Use This for My Outreach →",
    qs:[
      {key:"skill",     q:"Hey! 👋 I'm your AI Niche Advisor.\n\nWhat is your main skill? (e.g. Graphic Design, Video Editing, Coding, Writing, Marketing, Photography, Teaching...)",type:"text"},

const wait=ms=>new Promise(r=>setTimeout(r,ms));
function scrollBot(){setTimeout(()=>document.getElementById('bottom').scrollIntoView({behavior:'smooth'}),80)}
function enableInp(){inp.disabled=false;btn.disabled=false;inp.focus()}
function disableInp(){inp.disabled=true;btn.disabled=true}

function updateProg(){
  const U=UI[lang],total=U.qs.length;
  const pct=Math.round((curQ/total)*100);
  progBar.style.width=pct+'%';

function addAI(html,isHTML=false){

}
function addUser(text){
  const m=document.createElement('div');m.className='msg user';

}
function showThink(){
  const m=document.createElement('div');m.className='msg ai';m.id='think';

function showChips(opts){
  const row=document.createElement('div');row.className='chips-row';row.id='chips';

async function askQ(idx){
  const U=UI[lang];

  progWrap.classList.add('on');updateProg();
  const q=U.qs[idx];
  await wait(280);addAI(q.q);
  if(q.type==='chips'){disableInp();showChips(q.opts)}
  else enableInp();
}

function handleChip(val){
  rmChips();disableInp();addUser(val);
  answers[UI[lang].qs[curQ].key]=val;curQ++;

}

async function callAI(systemMsg, messages, maxTok=1600){
  const res=await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:systemMsg||undefined, messages, max_tokens:maxTok})
  });
  const data=await res.json();
  if(data.error) throw new Error(data.error);
  return data.result||'';
}

function renderContentIdeas(content, U) {
  if(!content||!content.platforms) return '';
  const platforms = U.labels.contentPlatforms;
  const typeMap = U.labels.contentTypes;

  function typeClass(t){
    if(t==='hook') return 'ci-type-hook';
    if(t==='edu')  return 'ci-type-edu';
    if(t==='story')return 'ci-type-story';
    return 'ci-type-trend';
  }

  const tabsHtml = platforms.map((p,i)=>
    `<button class="content-platform-tab${i===0?' active':''}"
      onclick="switchContentTab(this,'content-pane-${i}')">${p}</button>`
  ).join('');

  const panesHtml = platforms.map((p,i)=>{
    const ideas = content.platforms[p] || [];
    const ideasHtml = ideas.map(idea=>`
      <div class="content-idea">
        <div class="ci-type ${typeClass(idea.type)}">${typeMap[idea.type]||idea.type}</div>
        <div class="ci-title">${idea.title||''}</div>
        ${idea.why?`<div class="ci-why">${idea.why}</div>`:''}
      </div>`).join('');
    return `<div class="content-ideas-list${i===0?' active':''}" id="content-pane-${i}">${ideasHtml}</div>`;
  }).join('');

  return `
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">${U.labels.contentLabel}</div>
      <div class="content-card">
        <div class="content-platforms">${tabsHtml}</div>
        ${panesHtml}
        ${content.trendNote?`<div class="content-trend-note">${content.trendNote}</div>`:''}
      </div>
    </div>`;
}

function switchContentTab(btn, paneId){
  btn.closest('.content-card').querySelectorAll('.content-platform-tab').forEach(t=>t.classList.remove('active'));
  btn.closest('.content-card').querySelectorAll('.content-ideas-list').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const pane=document.getElementById(paneId);
  if(pane) pane.classList.add('active');
}

function render30DayPlan(plan, U) {
  if(!plan||!plan.weeks) return '';
  const badgeCls = ['pw-1','pw-2','pw-3','pw-4'];
  const weekLabels = U.labels.planWeeks;

  const weeksHtml = plan.weeks.map((w,i) => {
    const tasks = (w.tasks||[]).map((t,ti)=>`
      <div class="plan-task">
        <span class="plan-task-num">${ti+1}</span>
        <span>${t}</span>
      </div>`).join('');
    return `
      <div class="plan-week">
        <div class="plan-week-header">
          <span class="plan-week-badge ${badgeCls[i]||'pw-1'}">${weekLabels[i]||'Week '+(i+1)}</span>
          <span class="plan-week-title">${w.title||''}</span>
        </div>
        <div class="plan-tasks">${tasks}</div>
      </div>`;
  }).join('');

  return `
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">${U.labels.planLabel}</div>
      <div class="plan-card">
        ${weeksHtml}
        ${plan.endGoal?`<div class="plan-goal">${plan.endGoal}</div>`:''}
      </div>
    </div>`;
}

function renderPricing(p, U) {
  if(!p) return '';
  const tiers = [
    {key:'beginner',    cls:'pt-beginner',    idx:0},
    {key:'intermediate',cls:'pt-intermediate', idx:1},
    {key:'expert',      cls:'pt-expert',       idx:2}
  ];
  const cur = p.currency || 'USD';
  const sym = cur==='USD'?'$':cur==='GBP'?'£':cur==='EUR'?'€':'$';

  const tiersHtml = tiers.map(t => {
    const d = p[t.key]; if(!d) return '';
    return `<div class="price-tier ${t.cls}">
      <div class="price-tier-name">${U.labels.priceTiers[t.idx]}</div>
      <div class="price-amount">${sym}${d.projectMin}–${sym}${d.projectMax}</div>
      <div class="price-unit">${U.labels.pricePerProject}</div>
      <div class="price-hourly">${sym}${d.hourlyMin}–${sym}${d.hourlyMax} ${U.labels.pricePerHour}</div>
    </div>`;
  }).join('');

  return `
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">${U.labels.priceLabel}</div>
      <div class="price-card">
        <div class="price-tiers">${tiersHtml}</div>
        ${p.tip?`<div class="price-tip">${p.tip}</div>`:''}
      </div>
    </div>`;
}

function renderCompetitor(comp, U) {
  if(!comp||!comp.competitors) return '';
  function threatClass(t){
    const l=(t||'').toLowerCase();
    if(l.includes('high')) return 'cb-high';
    if(l.includes('med')) return 'cb-med';
    return 'cb-low';
  }
  const items = comp.competitors.map(c=>`
    <div class="comp-item">
      <div class="comp-item-top">
        <span class="comp-name">${c.name||''}</span>
        <span class="comp-badge ${threatClass(c.threatLevel)}">${U.compThreats}: ${c.threatLevel||''}</span>
      </div>
      <div class="comp-desc">${c.description||''}</div>
      ${c.gap?`<div class="comp-gap">${c.gap}</div>`:''}
    </div>`).join('');
  return `
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">${U.labels.compLabel}</div>
      <div class="comp-card">
        ${items}
        ${comp.winningAngle?`<div class="comp-summary"><strong>${U.labels.compGapLabel}:</strong> ${comp.winningAngle}</div>`:''}
      </div>
    </div>`;
}

function renderScoreCard(sc, U) {
  const metrics = [
    { key:'marketDemand',   color:'#5cf0c8', riskInverse:false },
    { key:'competitionLevel', color:'#fcb45c', riskInverse:true  },
    { key:'incomePotential',color:'#7c5cfc', riskInverse:false },
    { key:'aiRisk',         color:'#fc5c7d', riskInverse:true  }
  ];

  function barColor(score, isRisk) {
    if (isRisk) {
      if (score <= 30) return '#5cf0c8';
      if (score <= 60) return '#fcb45c';
      return '#fc5c7d';
    } else {
      if (score >= 70) return '#5cf0c8';
      if (score >= 45) return '#fcb45c';
      return '#fc5c7d';
    }
  }

  function labelClass(label) {
    const l = (label||'').toLowerCase();
    if (l.includes('high')||l.includes('strong')||l.includes('low')) return 'sv-high';
    if (l.includes('mod')||l.includes('medium')) return 'sv-mod';
    return 'sv-low';
  }

  const metricsHtml = metrics.map((m, i) => {
    const data = sc[m.key];
    if (!data) return '';
    const fillColor = barColor(data.score, m.riskInverse);
    const score = Math.min(100, Math.max(0, data.score));
    return `
      <div class="score-metric">
        <div class="score-metric-top">
          <span class="score-metric-name">${U.labels.scoreMetrics[i]}</span>
          <span class="score-metric-val ${labelClass(data.label)}">${data.label} · ${score}%</span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:${score}%;background:${fillColor}"></div>
        </div>
        ${data.reason ? `<div class="score-metric-reason">${data.reason}</div>` : ''}
      </div>`;
  }).join('');

  const overall = sc.overall || {};
  const grade = overall.grade || '—';
  const gradeColor = (overall.score||0) >= 70 ? '#5cf0c8' : (overall.score||0) >= 50 ? '#fcb45c' : '#fc5c7d';

  return `
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">${U.labels.scoreCard}</div>
      <div class="score-card">
        <div class="score-overall">
          <div>
            <div class="score-grade" style="color:${gradeColor}">${grade}<span>${U.labels.scoreOverall}</span></div>
          </div>
          <div class="score-summary">${overall.summary || ''}</div>
        </div>
        ${metricsHtml}
      </div>
    </div>`;
}

function showResult(r,outreachMsg,isPortfolioBased,compData=null,priceData=null,planData=null,contentData=null){
  const U=UI[lang];
  addAI(`<strong>${U.resultIntro}</strong>`,true);
  const oid='om-'+Date.now();
  const outreachLabel=isPortfolioBased?U.labels.outreachPortfolio:U.labels.outreachGeneric;
  const html=`
  <div class="result-card">
    <div class="rsec"><div class="rlabel">✦ ${U.labels.niche}</div><div class="rtitle">${r.niche.title}</div><div class="rtext">${r.niche.description}</div></div>
    <div class="divider"></div>
    <div class="rsec"><div class="rlabel">🎯 ${U.labels.why}</div><div class="rtext">${r.whyThisNiche}</div></div>
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">👥 ${U.labels.audience}</div>
      <div class="rtext" style="margin-bottom:8px">${r.targetAudience.primary}</div>
      <div class="tags">${r.targetAudience.segments.map(s=>`<span class="tag teal">${s}</span>`).join('')}</div>
    </div>
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">⚡ ${U.labels.problems}</div>
      ${r.problems.map((p,i)=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;color:#c0bce0;line-height:1.6"><span style="width:22px;height:22px;border-radius:6px;background:rgba(252,92,125,.15);color:#ff7fa0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</span><span>${p}</span></div>`).join('')}
    </div>
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">💡 ${U.labels.solutions}</div>
      ${r.solutions.map((s,i)=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;color:#c0bce0;line-height:1.6"><span style="width:22px;height:22px;border-radius:6px;background:rgba(124,92,252,.15);color:#a88fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</span><span>${s}</span></div>`).join('')}
    </div>
    <div class="divider"></div>
    <div class="rsec"><div class="rlabel">🤖 ${U.labels.ai}</div><div class="rtext">${r.aiOpportunity}</div></div>
    <div class="divider"></div>
    <div class="rsec"><div class="rlabel">🚀 ${U.labels.step}</div><div class="rtext" style="color:white;font-weight:500;font-size:15px">${r.firstStep}</div></div>
    ${outreachMsg?`
    <div class="divider"></div>
    <div class="rsec">
      <div class="rlabel">${U.labels.outreach}</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${outreachLabel}</div>
      <div class="outreach-box">
        <div class="outreach-msg" id="${oid}">${outreachMsg}</div>
        <button class="copy-btn" onclick="doCopy('${oid}',this)">📋 ${U.copy}</button>
      </div>
    </div>`:''}
    ${compData ? renderCompetitor(compData, U) : ''}
    ${priceData ? renderPricing(priceData, U) : ''}
    ${planData ? render30DayPlan(planData, U) : ''}
    ${contentData ? renderContentIdeas(contentData, U) : ''}
    ${r.scoreCard ? renderScoreCard(r.scoreCard, U) : ''}
  </div>
  <br><button class="restart-btn" onclick="doRestart()">${U.restart}</button>`;

  const wrap=document.createElement('div');wrap.className='msg ai';wrap.style.animationDelay='.15s';
  wrap.innerHTML=`<div class="av ai-av">✦</div><div style="flex:1">${html}</div>`;
  chat.appendChild(wrap);scrollBot();
  startChat();
}

function startChat(){
  const U=UI[lang];
  chatHistory=[];mode='chat';
  const hint=document.createElement('div');hint.className='msg ai';
  hint.innerHTML=`<div class="av ai-av">✦</div><div class="chat-hint">${U.chatHint}</div>`;
  chat.appendChild(hint);scrollBot();
  inp.placeholder=U.phChat;inp.disabled=false;btn.disabled=false;inp.focus();
}

async function handleChat(val){
  disableInp();inp.value='';inp.style.height='auto';
  addUser(val);showThink();
  chatHistory.push({role:'user',content:val});
  const sysMsg=lang==='en'
    ?`You are NicheIQ, a friendly freelance business advisor. The user's niche is: "${lastResult?.niche?.title||'analyzed'}". Answer follow-up questions helpfully in under 100 words.`
    :`Aap NicheIQ hain, ek dost freelance business advisor. User ki niche hai: "${lastResult?.niche?.title||'analyzed'}". Sawalaat ka madadgar jawab dein, 100 words se kam mein. Roman Urdu mein jawab dein.`;
  try{
    const reply=await callAI(sysMsg,chatHistory,400);
    chatHistory.push({role:'assistant',content:reply});
    rmThink();addAI(reply);
  }catch(e){
    rmThink();addAI(lang==='en'?"Sorry, couldn't connect. Try again.":"Maafi, connection fail hua. Dobara try karein.");
  }
  inp.disabled=false;btn.disabled=false;inp.focus();
}

function doCopy(id,el){
  const U=UI[lang];
  navigator.clipboard.writeText(document.getElementById(id).textContent).then(()=>{
    el.textContent=U.copied;el.classList.add('ok');
    setTimeout(()=>{el.textContent='📋 '+U.copy;el.classList.remove('ok')},2000);
  });
}

function doRestart(){
  curQ=0;answers={};portfolioDesc='';lastResult=null;chatHistory=[];mode='quiz';
  chat.innerHTML='';progBar.style.width='0%';progWrap.classList.remove('on');
  inp.value='';inp.style.height='auto';inp.placeholder=UI[lang].ph;disableInp();
  setTimeout(()=>askQ(0),400);
}

window.onload=()=>setTimeout(()=>askQ(0),600);
</script>
